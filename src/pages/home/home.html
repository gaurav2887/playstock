<ion-header>
  <ion-navbar>
    <button ion-button menuToggle>
      <ion-icon name="menu"></ion-icon>
    </button>
    <ion-title>My Watchlist</ion-title>
  </ion-navbar>
</ion-header>

<ion-content padding>
  <ion-list>
      <ion-item-sliding *ngFor="let company of watchlist">
    <ion-item>
      <h2>{{ company.symbol }}</h2>
      <p>{{ company.name }}</p>
      <h2 class="price" item-right>${{ company.price }}</h2>
      <ion-note class="{{ company.gain }}" item-end>${{ company.changePrice }} - {{ company.changePercent }}%</ion-note>
    </ion-item>
    <ion-item-options side="right">
        <button ion-button color="danger">
          <ion-icon name="Remove"></ion-icon>
          Remove
        </button>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>
</ion-content>
