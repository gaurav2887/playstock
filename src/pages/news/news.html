<ion-content>

    <ion-list>
        <ion-list-header>News</ion-list-header>
        <ion-card *ngFor="let singleNews of news">
            <ion-card-header>
                <a href="{{ singleNews.url }}">{{singleNews.headline}}</a>
            </ion-card-header>
            <ion-card-content>
                {{ singleNews.summary }}
            </ion-card-content>
        </ion-card>
    </ion-list>
</ion-content>
